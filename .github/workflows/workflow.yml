name: Publish to PyPI

# Publishes to PyPI on every published GitHub Release, using PyPI Trusted Publishing (OIDC) — no
# API tokens or secrets to store. Needs (one-time): a "pypi" environment under the repo's
# Settings -> Environments, and a matching Trusted Publisher registered on PyPI for this repo +
# this workflow filename + the "pypi" environment.
on:
  release:
    types: [published]

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build the distribution
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Upload the built distribution
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # MUST match the Environment name in the PyPI publisher + repo settings
    permissions:
      id-token: write          # lets GitHub mint the OIDC token PyPI trusts (no password needed)
    steps:
      - name: Download the built distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
